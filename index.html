<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 — Tổng quan giải đấu</title>
    <link rel="icon" type="image/png" href="/Favicon.png">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFSCQRQZM6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PFSCQRQZM6');
    </script>
    <style>
        /* ============================================
           CSS RESET + VARIABLES
           ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f4f8;
            --bg-secondary: #e4eaf2;
            --surface: #ffffff;
            --surface-hover: #f0f4f8;
            --surface-alt: #e8eef6;
            --stroke: #d0d8e8;
            --stroke-light: #b8c4d8;
            --text-primary: #1a2035;
            --text-secondary: #3d5075;
            --text-tertiary: #7a8faa;
            --green-bg: rgba(16, 185, 129, 0.10);
            --green-border: #10b981;
            --green-text: #047857;
            --yellow-bg: rgba(245, 158, 11, 0.10);
            --yellow-border: #d97706;
            --yellow-text: #92400e;
            --blue: #2563eb;
            --indigo: #4f46e5;
            --pink: #db2777;
            --purple: #7c3aed;
            --orange: #ea580c;
            --gold: #b45309;
            --red: #dc2626;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --radius: 10px;
            --radius-sm: 6px;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ============================================
           HEADER
           ============================================ */
        .site-header {
            background: var(--bg);
        }

        .header-banner {
            width: 100%;
            display: block;
            height: auto;
        }

        .header-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, #1e3a6e 0%, #1a2e5a 50%, #152448 100%);
            border-bottom: 1px solid var(--stroke);
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #eab308, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .meta-updated {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .btn-refresh {
            background: var(--surface);
            border: 1px solid var(--stroke);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-refresh:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            border-color: var(--stroke-light);
        }

        .btn-refresh.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ============================================
           MAIN LAYOUT
           ============================================ */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--stroke);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title-icon {
            font-size: 20px;
        }

        /* ============================================
           LOADING STATE
           ============================================ */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--stroke);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error-container {
            text-align: center;
            padding: 60px 20px;
            color: var(--red);
        }

        /* ============================================
           GROUP STANDINGS GRID
           ============================================ */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .groups-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 650px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
        }

        .group-card {
            background: var(--surface);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .group-card-header {
            padding: 10px 14px;
            background: var(--surface-alt);
            border-bottom: 1px solid var(--stroke);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .group-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .group-table th {
            padding: 6px 4px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--stroke);
        }

        .group-table th:first-child,
        .group-table td:first-child {
            width: 28px;
            text-align: center;
        }

        .group-table th:nth-child(2),
        .group-table td:nth-child(2) {
            text-align: left;
            padding-left: 8px;
        }

        .group-table td {
            padding: 7px 4px;
            text-align: center;
            border-bottom: 1px solid rgba(42, 58, 92, 0.4);
            color: var(--text-secondary);
        }

        .group-table tbody tr:last-child td {
            border-bottom: none;
        }

        .group-table .team-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            text-align: left;
        }

        .team-flag {
            font-size: 14px;
            flex-shrink: 0;
        }

        .team-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .pos-num {
            font-weight: 700;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .col-pts {
            font-weight: 700;
            color: var(--text-primary) !important;
        }

        .col-gd-pos { color: var(--green-text) !important; }
        .col-gd-neg { color: var(--red) !important; }
        .col-gd-zero { color: var(--text-tertiary) !important; }

        /* Qualification highlights */
        .row-qualify td {
            background: var(--green-bg);
        }

        .row-qualify .pos-num {
            color: var(--green-text);
        }

        .row-third td {
            background: var(--yellow-bg);
        }

        .row-third .pos-num {
            color: var(--yellow-text);
        }

        /* ============================================
           THIRD PLACE TABLE
           ============================================ */
        .third-place-wrapper {
            background: var(--surface);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .third-place-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--stroke);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .third-place-header-title {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
        }

        .third-place-header-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-left: auto;
        }

        .qualifying-combo {
            font-size: 12px;
            color: var(--yellow-text);
            font-weight: 600;
            background: var(--yellow-bg);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .third-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .third-table th {
            padding: 8px 6px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--stroke);
        }

        .third-table th:nth-child(2),
        .third-table td:nth-child(2) {
            text-align: left;
            padding-left: 10px;
        }

        .third-table td {
            padding: 8px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(42, 58, 92, 0.4);
            color: var(--text-secondary);
        }

        .third-table tbody tr:last-child td {
            border-bottom: none;
        }

        .third-table .row-qualify-third td {
            background: var(--green-bg);
        }

        .third-table .row-eliminate td {
            opacity: 0.5;
        }

        .third-team-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .third-group-badge {
            font-size: 10px;
            color: var(--text-tertiary);
            background: var(--bg);
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* ============================================
           BRACKET
           ============================================ */
        .bracket-section {
            overflow-x: auto;
            overflow-y: hidden;
            /* break out of .main-content max-width */
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
            padding: 0;
            position: relative;
        }

        .bracket-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('/TheWorldcup.png') center center / auto no-repeat;
            background-attachment: fixed;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .bracket-section > * {
            position: relative;
            z-index: 1;
        }

        .bracket-scroll-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            display: none;
        }

        @media (max-width: 1200px) {
            .bracket-scroll-hint {
                display: block;
            }
        }

        .bracket-container {
            position: relative;
            min-width: max-content;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 20px;
        }

        .bracket-side {
            display: flex;
            align-items: flex-start;
        }

        .bracket-side.right {
            flex-direction: row-reverse;
        }

        .bracket-round-col {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .round-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            padding: 3px 10px;
            border-radius: 4px;
            background: var(--surface);
            border: 1px solid var(--stroke);
            white-space: nowrap;
        }

        .round-cards {
            position: relative;
        }

        .bracket-match-card {
            position: absolute;
            width: 165px;
            min-height: 80px;
            background: var(--surface);
            border: 1px solid var(--stroke);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .bracket-match-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        /* Border side indicators */
        .bracket-side.left .bracket-match-card {
            border-left: 3px solid var(--card-accent, var(--blue));
        }

        .bracket-side.right .bracket-match-card {
            border-right: 3px solid var(--card-accent, var(--blue));
        }

        .bracket-center .bracket-match-card {
            border-left: 3px solid var(--card-accent, var(--gold));
            border-right: 3px solid var(--card-accent, var(--gold));
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .card-match-num {
            font-weight: 700;
            color: var(--text-secondary);
        }

        .card-datetime {
            font-size: 9px;
        }

        .card-teams {
            padding: 4px 8px 6px;
        }

        .card-team-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 2px 0;
        }

        .card-team-row + .card-team-row {
            border-top: 1px solid rgba(42, 58, 92, 0.3);
            padding-top: 3px;
        }

        .card-team-flag {
            font-size: 13px;
            flex-shrink: 0;
        }

        .card-team-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-team-name.tbd {
            color: var(--text-tertiary);
            font-style: italic;
        }

        .card-team-score {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 16px;
            text-align: right;
        }

        .card-team-row.loser {
            opacity: 0.4;
        }

        .card-team-row.winner .card-team-name {
            color: var(--green-text);
        }

        .card-penalty-inline {
            font-size: 9px;
            font-weight: 600;
            color: var(--yellow-border);
            margin-left: 2px;
        }

        .card-group-pos {
            font-size: 9px;
            font-weight: 700;
            color: #ffffff;
            background: #3d5075;
            padding: 1px 4px;
            border-radius: 3px;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        /* Connector columns */
        .connector-col {
            width: 28px;
            position: relative;
        }

        .connector-col svg {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* Center column (Final + 3rd) */
        .bracket-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 185px;
        }

        /* Only the round-label sits above the relative div — no trophy in flow */
        .bracket-center .round-label {
            font-size: 12px;
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            color: #1a1a2e;
            border: none;
        }

        .trophy-icon {
            position: absolute;
            font-size: 28px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .bracket-center .bracket-match-card {
            position: relative;
            width: 175px;
        }

        .bracket-center .card-3rd .round-label {
            background: var(--surface);
            color: var(--text-tertiary);
            border: 1px solid var(--stroke);
        }

        .third-place-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-tertiary);
            margin-top: 16px;
            margin-bottom: 8px;
            padding: 3px 10px;
            border-radius: 4px;
            background: var(--surface);
            border: 1px solid var(--stroke);
        }


        /* ============================================
           BRACKET TABS
           ============================================ */
        .bracket-tabs {
            display: flex;
            gap: 4px;
            padding: 0;
            margin-bottom: 0;
        }

        .bracket-tab-btn {
            padding: 8px 20px;
            border: 1px solid var(--stroke);
            border-bottom: none;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            background: var(--surface-alt);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .bracket-tab-btn.active {
            background: var(--surface);
            color: var(--text-primary);
            position: relative;
            z-index: 2;
        }

        .bracket-tab-btn:hover:not(.active) {
            background: var(--surface-hover);
        }

        .bracket-tab-pane { display: none; }
        .bracket-tab-pane.active { display: block; }

        /* ============================================
           CIRCULAR BRACKET
           ============================================ */
        .circ-stage-outer {
            display: flex;
            justify-content: center;
            padding: 24px 10px 50px;
            overflow-x: auto;
        }

        .circ-stage-wrap {
            position: relative;
            width: 840px;
            height: 840px;
            flex: none;
        }

        #circStage {
            position: absolute;
            inset: 0;
            width: 840px;
            height: 840px;
        }

        #circLines {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
            pointer-events: none;
        }

        .circ-slot {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 2px solid var(--stroke);
            user-select: none;
            overflow: visible;
        }

        .circ-slot.filled {
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .circ-slot.filled:hover {
            transform: translate(-50%, -50%) scale(1.12);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .circ-slot.empty { opacity: 0.22; }

        .circ-slot.loser {
            opacity: 0.28;
            filter: grayscale(0.5);
        }

        .circ-slot.champion {
            box-shadow: 0 0 0 3px #d97706, 0 0 20px rgba(217,119,6,0.35);
        }

        .circ-slot-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .circ-slot-tip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--text-secondary);
            white-space: nowrap;
            pointer-events: none;
            background: var(--surface);
            padding: 1px 5px;
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            border: 1px solid var(--stroke);
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 10;
        }

        .circ-slot.filled:hover .circ-slot-tip { opacity: 1; }

        .circ-trophy {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            font-size: 44px;
            pointer-events: none;
            z-index: 1;
        }

        .circ-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 12px 16px 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .circ-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .circ-legend-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Circular popup */
        .circ-popup {
            position: fixed;
            z-index: 1000;
            background: var(--surface);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            padding: 12px 16px 10px;
            min-width: 210px;
            max-width: 280px;
        }

        .circ-popup-close {
            position: absolute;
            top: 6px; right: 10px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-tertiary);
            line-height: 1;
        }

        .circ-popup-close:hover { color: var(--text-primary); }

        .circ-popup-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
            padding-right: 16px;
        }

        .circ-popup-team {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            border-radius: 4px;
        }

        .circ-popup-team + .circ-popup-team {
            border-top: 1px solid var(--stroke);
        }

        .circ-popup-team.winner { background: var(--green-bg); }
        .circ-popup-team.loser-row { opacity: 0.45; }

        .circ-popup-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .circ-popup-score {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .circ-popup-pen {
            font-size: 10px;
            font-weight: 600;
            color: var(--yellow-border);
            margin-left: 2px;
        }

        .circ-popup-date {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 8px;
            text-align: center;
        }

        .circ-no-result {
            font-size: 11px;
            color: var(--text-tertiary);
            text-align: center;
            padding: 4px 0;
            font-style: italic;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .site-footer {
            text-align: center;
            padding: 24px 16px;
            border-top: 1px solid var(--stroke);
            color: var(--text-tertiary);
            font-size: 11px;
        }

        /* ============================================
           SCROLLBAR STYLING
           ============================================ */
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        ::-webkit-scrollbar-track {

    &nbsp;&mdash;&nbsp; Data by FIFA World Cup

<script>
// ============================================
// CONSTANTS
// ============================================
const CARD_H = 80;
const PAIR_GAP = 8;         // gap between 2 cards in the same feeder pair
const INTER_PAIR_GAP = 16;  // gap between different pairs within the same half
const HALF_DIVIDER = 24;    // gap between top group (4) and bottom group (4)
const CARD_W = 165;

// R32 half height = 4 cards + 3 internal gaps (8 + 16 + 8)
const R32_HALF_H = 4 * CARD_H + PAIR_GAP + INTER_PAIR_GAP + PAIR_GAP; // 360
const TOTAL_H = 2 * R32_HALF_H + HALF_DIVIDER; // 744

const BRACKET_LEFT_R32  = [74, 77, 73, 75, 83, 84, 81, 82];
const BRACKET_LEFT_R16  = [89, 90, 93, 94];
const BRACKET_LEFT_QF   = [97, 98];
const BRACKET_LEFT_SF   = [101];
const BRACKET_RIGHT_R32 = [76, 78, 79, 80, 86, 88, 85, 87];
const BRACKET_RIGHT_R16 = [91, 92, 95, 96];
const BRACKET_RIGHT_QF  = [99, 100];
const BRACKET_RIGHT_SF  = [102];
const BRACKET_FINAL     = [104];
const BRACKET_THIRD     = [103];

// Round colors
const ROUND_TYPE_COLORS = {
    'R32-A': '#2563eb',
    'R32-B': '#059669',
    'R32-C': '#ea580c',
    'R32': '#2563eb',
    'R16': '#4f46e5',
    'QF': '#db2777',
    'SF': '#7c3aed',
    'FINAL': '#b45309',
    '3RD': '#64748b'
};

function getRoundColor(match) {
    if (match.round === 'R32' && match.type) {
        return ROUND_TYPE_COLORS['R32-' + match.type] || ROUND_TYPE_COLORS['R32'];
    }
    return ROUND_TYPE_COLORS[match.round] || '#3b82f6';
}

// ============================================
// STATE
// ============================================
let cachedData = null;

// ============================================
// DATA FETCHING
// ============================================
async function fetchData() {
    const resp = await fetch('/api/data');
    if (!resp.ok) throw new Error('Failed to fetch data: ' + resp.status);
    return await resp.json();
}

async function loadData() {
    try {
        const result = await fetchData();
        cachedData = result;
        renderAll(result);
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById('mainContent').innerHTML =
            '<div class="error-container"><p>Không thể tải dữ liệu. Vui lòng thử lại sau.</p></div>';
    }
}

async function refreshData() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('loading');
    document.getElementById('refreshIcon').style.animation = 'spin 0.8s linear infinite';
    try {
        const result = await fetchData();
        cachedData = result;
        renderAll(result);
    } catch (err) {
        console.error('Refresh error:', err);
    } finally {
        btn.classList.remove('loading');
        document.getElementById('refreshIcon').style.animation = '';
    }
}

// ============================================
// RENDER ALL
// ============================================
function renderAll(result) {
    const data = result.data;
    const publishedAt = result.publishedAt;

    // Update timestamp
    if (publishedAt) {
        const d = new Date(publishedAt);
        const formatted = d.toLocaleString('vi-VN', {
            timeZone: 'Asia/Ho_Chi_Minh',
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
        document.getElementById('metaUpdated').textContent = 'Cập nhật lần cuối: ' + formatted;
    }

    let html = '';
    html += renderGroupStandings(data.groups);
    html += renderThirdPlace(data.thirdPlace);
    html += renderBracket(data.bracket);
    document.getElementById('mainContent').innerHTML = html;
}

// ============================================
// GROUP STANDINGS
// ============================================
function renderGroupStandings(groups) {
    if (!groups) return '';

    const groupKeys = Object.keys(groups).sort();
    let cardsHTML = '';

    groupKeys.forEach(key => {
        const group = groups[key];
        const standings = group.standings || [];

        let rowsHTML = '';
        standings.forEach((t, i) => {
            const rowClass = i < 2 ? 'row-qualify' : (i === 2 ? 'row-third' : '');
            const gdClass = t.gd > 0 ? 'col-gd-pos' : (t.gd < 0 ? 'col-gd-neg' : 'col-gd-zero');
            const gdStr = t.gd > 0 ? '+' + t.gd : String(t.gd);

            rowsHTML += '<tr class="' + rowClass + '">' +
                '<td><span class="pos-num">' + t.pos + '</span></td>' +
                '<td><div class="team-cell"><span class="team-flag">' + (t.flag || '') + '</span><span class="team-name">' + escHtml(t.name) + '</span></div></td>' +
                '<td>' + t.mp + '</td>' +
                '<td>' + t.w + '</td>' +
                '<td>' + t.d + '</td>' +
                '<td>' + t.l + '</td>' +
                '<td>' + t.gf + '</td>' +
                '<td>' + t.ga + '</td>' +
                '<td class="' + gdClass + '" style="font-weight:600">' + gdStr + '</td>' +
                '<td class="col-pts">' + t.pts + '</td>' +
                '</tr>';
        });

        cardsHTML += '<div class="group-card">' +
            '<div class="group-card-header">Bảng ' + escHtml(key) + '</div>' +
            '<div style="overflow-x:auto;">' +
            '<table class="group-table">' +
            '<thead><tr>' +
            '<th>#</th><th>Đội</th><th>T</th><th>Th</th><th>H</th><th>B</th><th>BT</th><th>BB</th><th>+/-</th><th>Đ</th>' +
            '</tr></thead>' +
            '<tbody>' + rowsHTML + '</tbody>' +
            '</table></div></div>';
    });

    return '<div class="section">' +
        '<div class="section-title"><span class="section-title-icon">&#9917;</span> Bảng xếp hạng vòng bảng</div>' +
        '<div class="groups-grid">' + cardsHTML + '</div></div>';
}

// ============================================
// THIRD PLACE
// ============================================
function renderThirdPlace(thirdPlace) {
    if (!thirdPlace || !thirdPlace.teams || thirdPlace.teams.length === 0) return '';

    const teams = thirdPlace.teams;
    const combo = thirdPlace.qualifyingCombination || '';

    let rowsHTML = '';
    teams.forEach((t, i) => {
        const rowClass = t.qualifying ? 'row-qualify-third' : 'row-eliminate';
        const gdClass = t.gd > 0 ? 'col-gd-pos' : (t.gd < 0 ? 'col-gd-neg' : 'col-gd-zero');
        const gdStr = t.gd > 0 ? '+' + t.gd : String(t.gd);

        rowsHTML += '<tr class="' + rowClass + '">' +
            '<td style="font-weight:700;color:var(--text-tertiary);">' + (i + 1) + '</td>' +
            '<td><div class="third-team-cell">' +
            '<span class="team-flag">' + (t.flag || '') + '</span>' +
            '<span class="team-name">' + escHtml(t.name) + '</span>' +
            '<span class="third-group-badge">' + escHtml(t.group) + '</span>' +
            '</div></td>' +
            '<td>' + t.mp + '</td>' +
            '<td>' + t.w + '</td>' +
            '<td>' + t.d + '</td>' +
            '<td>' + t.l + '</td>' +
            '<td>' + t.gf + '</td>' +
            '<td>' + t.ga + '</td>' +
            '<td class="' + gdClass + '" style="font-weight:600">' + gdStr + '</td>' +
            '<td class="col-pts">' + t.pts + '</td>' +
            '</tr>';
    });

    const comboHTML = combo ? '<span class="qualifying-combo">Tổ hợp: ' + escHtml(combo) + '</span>' : '';

    return '<div class="section">' +
        '<div class="section-title"><span class="section-title-icon">&#128260;</span> Xếp hạng đội hạng 3</div>' +
        '<div class="third-place-wrapper">' +
        '<div class="third-place-header">' +
        '<span class="third-place-header-title">So sánh các đội hạng 3</span>' +
        comboHTML +
        '<span class="third-place-header-sub">Top 8 đi tiếp</span>' +
        '</div>' +
        '<div style="overflow-x:auto;">' +
        '<table class="third-table">' +
        '<thead><tr>' +
        '<th>#</th><th>Đội</th><th>T</th><th>Th</th><th>H</th><th>B</th><th>BT</th><th>BB</th><th>+/-</th><th>Đ</th>' +
        '</tr></thead>' +
        '<tbody>' + rowsHTML + '</tbody>' +
        '</table></div></div></div>';
}

// ============================================
// POSITION COMPUTATION
// ============================================

// 4-card positions within one half (top or bottom)
// gaps: [PAIR_GAP, INTER_PAIR_GAP, PAIR_GAP] = [8, 16, 8]
function r32HalfPositions(halfBase) {
    return [
        halfBase,
        halfBase + CARD_H + PAIR_GAP,
        halfBase + 2 * CARD_H + PAIR_GAP + INTER_PAIR_GAP,
        halfBase + 3 * CARD_H + 2 * PAIR_GAP + INTER_PAIR_GAP
    ];
}

// Center y of a card given its top
function cardCenter(top) { return top + CARD_H / 2; }

// Top of a card centered between two feeder card tops
function centeredBetween(topA, topB) {
    return (cardCenter(topA) + cardCenter(topB)) / 2 - CARD_H / 2;
}

// Compute all bracket positions from R32 geometry
function computeAllPositions() {
    const topBase = 0;
    const botBase = R32_HALF_H + HALF_DIVIDER;

    const r32 = [...r32HalfPositions(topBase), ...r32HalfPositions(botBase)];

    // R16: each card centered between its feeder pair
    // feeders: (0,1)→r16[0], (2,3)→r16[1], (4,5)→r16[2], (6,7)→r16[3]
    const r16 = [
        centeredBetween(r32[0], r32[1]),
        centeredBetween(r32[2], r32[3]),
        centeredBetween(r32[4], r32[5]),
        centeredBetween(r32[6], r32[7])
    ];

    // QF: (r16[0],r16[1])→qf[0], (r16[2],r16[3])→qf[1]
    const qf = [
        centeredBetween(r16[0], r16[1]),
        centeredBetween(r16[2], r16[3])
    ];

    // SF: (qf[0],qf[1])→sf[0]  — should equal TOTAL_H/2 - CARD_H/2
    const sf = [centeredBetween(qf[0], qf[1])];

    return { r32, r16, qf, sf };
}

// ============================================
// BRACKET
// ============================================
function renderBracket(bracket) {
    if (!bracket) return '';

    const totalH = TOTAL_H;
    const pos = computeAllPositions();

    // Build cards for each round using pre-computed positions
    function buildSide(matchNums, positions, side) {
        let html = '';
        positions.forEach((top, i) => {
            const m = bracket[String(matchNums[i])];
            if (m) html += renderBracketCard(m, top, side);
        });
        return { html, positions };
    }

    const leftR32  = buildSide(BRACKET_LEFT_R32,  pos.r32, 'left');
    const leftR16  = buildSide(BRACKET_LEFT_R16,  pos.r16, 'left');
    const leftQF   = buildSide(BRACKET_LEFT_QF,   pos.qf,  'left');
    const leftSF   = buildSide(BRACKET_LEFT_SF,   pos.sf,  'left');

    const rightR32 = buildSide(BRACKET_RIGHT_R32, pos.r32, 'right');
    const rightR16 = buildSide(BRACKET_RIGHT_R16, pos.r16, 'right');
    const rightQF  = buildSide(BRACKET_RIGHT_QF,  pos.qf,  'right');
    const rightSF  = buildSide(BRACKET_RIGHT_SF,  pos.sf,  'right');

    // Connectors
    const connL_R32_R16 = buildConnectors(leftR32.positions, leftR16.positions, totalH, 'left');
    const connL_R16_QF  = buildConnectors(leftR16.positions, leftQF.positions, totalH, 'left');
    const connL_QF_SF   = buildConnectors(leftQF.positions, leftSF.positions, totalH, 'left');

    const connR_R32_R16 = buildConnectors(rightR32.positions, rightR16.positions, totalH, 'right');
    const connR_R16_QF  = buildConnectors(rightR16.positions, rightQF.positions, totalH, 'right');
    const connR_QF_SF   = buildConnectors(rightQF.positions, rightSF.positions, totalH, 'right');

    // SF to Final connectors (bezier curves)
    const leftSFCenter  = cardCenter(leftSF.positions[0]);
    const rightSFCenter = cardCenter(rightSF.positions[0]);
    const finalCenter   = totalH / 2;

    const connL_SF_F = buildSFtoFinalConnector(leftSFCenter, finalCenter, totalH, 'left');
    const connR_SF_F = buildSFtoFinalConnector(rightSFCenter, finalCenter, totalH, 'right');

    // Center cards (Final + 3rd)
    const finalMatch = bracket[String(BRACKET_FINAL[0])];
    const thirdMatch = bracket[String(BRACKET_THIRD[0])];

    const finalTop = totalH / 2 - CARD_H / 2;
    const thirdTop = finalTop + CARD_H + 40;

    // Trophy sits absolute inside the relative div, above the Final card
    const trophyTop = finalTop - 36;
    const centerHTML = '<div class="bracket-center">' +
        '<span class="round-label">&#127942; Chung kết</span>' +
        '<div style="position:relative;height:' + totalH + 'px;width:185px;">' +
        (trophyTop >= 0 ? '<span class="trophy-icon" style="top:' + trophyTop + 'px;">&#127942;</span>' : '') +
        (finalMatch ? renderBracketCard(finalMatch, finalTop, 'center') : '') +
        (thirdMatch ?
            '<div style="position:absolute;top:' + (thirdTop - 18) + 'px;width:100%;text-align:center;">' +
            '<span class="third-place-label">Tranh hạng 3</span></div>' +
            renderBracketCard(thirdMatch, thirdTop + 12, 'center') : '') +
        '</div></div>';

    const circLegendHTML =
        '<div class="circ-legend">' +
        '<span class="circ-legend-item"><i class="circ-legend-dot" style="background:#d97706"></i>Nhánh 1</span>' +
        '<span class="circ-legend-item"><i class="circ-legend-dot" style="background:#059669"></i>Nhánh 2</span>' +
        '<span class="circ-legend-item"><i class="circ-legend-dot" style="background:#db2777"></i>Nhánh 3</span>' +
        '<span class="circ-legend-item"><i class="circ-legend-dot" style="background:#2563eb"></i>Nhánh 4</span>' +
        '</div>';

    return '<div class="section">' +
        '<div class="section-title"><span class="section-title-icon">&#127942;</span> Sơ đồ knockout</div>' +

        // Tab switcher
        '<div class="bracket-tabs">' +
        '<button class="bracket-tab-btn active" data-tab="nhanh" onclick="switchBracketTab(\'nhanh\')">&#128307; Sơ đồ nhánh</button>' +
        '<button class="bracket-tab-btn" data-tab="tron" onclick="switchBracketTab(\'tron\')">&#9711; Sơ đồ tròn</button>' +
        '</div>' +

        '<div class="bracket-section">' +

        // Pane: bracket tree
        '<div class="bracket-tab-pane active" id="tab-nhanh">' +
        '<div class="bracket-scroll-hint">&larr; Vuốt ngang để xem toàn bộ &rarr;</div>' +
        '<div class="bracket-container">' +

        // LEFT SIDE
        '<div class="bracket-side left">' +
        renderRoundCol('V.32', leftR32.html, totalH) +
        '<div class="connector-col">' + connL_R32_R16 + '</div>' +
        renderRoundCol('V.16', leftR16.html, totalH) +
        '<div class="connector-col">' + connL_R16_QF + '</div>' +
        renderRoundCol('Tứ kết', leftQF.html, totalH) +
        '<div class="connector-col">' + connL_QF_SF + '</div>' +
        renderRoundCol('Bán kết', leftSF.html, totalH) +
        '<div class="connector-col">' + connL_SF_F + '</div>' +
        '</div>' +

        // CENTER
        centerHTML +

        // RIGHT SIDE
        '<div class="bracket-side right">' +
        renderRoundCol('V.32', rightR32.html, totalH) +
        '<div class="connector-col">' + connR_R32_R16 + '</div>' +
        renderRoundCol('V.16', rightR16.html, totalH) +
        '<div class="connector-col">' + connR_R16_QF + '</div>' +
        renderRoundCol('Tứ kết', rightQF.html, totalH) +
        '<div class="connector-col">' + connR_QF_SF + '</div>' +
        renderRoundCol('Bán kết', rightSF.html, totalH) +
        '<div class="connector-col">' + connR_SF_F + '</div>' +
        '</div>' +

        '</div>' + // bracket-container
        '</div>' + // tab-nhanh

        // Pane: circular bracket
        '<div class="bracket-tab-pane" id="tab-tron">' +
        circLegendHTML +
        '<div class="circ-stage-outer">' +
        '<div class="circ-stage-wrap">' +
        '<div id="circStage">' +
        '<svg id="circLines" viewBox="0 0 840 840"></svg>' +
        '<div id="circTrophy" class="circ-trophy">&#127942;</div>' +
        '</div></div></div>' +
        '</div>' + // tab-tron

        '</div>' + // bracket-section
        '</div>'; // section
}

function renderRoundCol(label, cardsHTML, totalH) {
    return '<div class="bracket-round-col">' +
        '<span class="round-label">' + escHtml(label) + '</span>' +
        '<div class="round-cards" style="position:relative;width:' + CARD_W + 'px;height:' + totalH + 'px;">' +
        cardsHTML +
        '</div></div>';
}

// ============================================
// RENDER SINGLE BRACKET CARD
// ============================================
function renderBracketCard(match, top, side) {
    const accentColor = getRoundColor(match);
    const homeTeam = match.home || 'TBD';
    const awayTeam = match.away || 'TBD';
    const homeFlag = match.homeFlag || '';
    const awayFlag = match.awayFlag || '';
    const hasScore = match.homeScore !== null && match.homeScore !== undefined;

    let homeClass = '';
    let awayClass = '';
    if (hasScore) {
        const hs = match.homePenalty != null ? match.homePenalty : match.homeScore;
        const as = match.awayPenalty != null ? match.awayPenalty : match.awayScore;
        if (hs > as) { homeClass = 'winner'; awayClass = 'loser'; }
        else if (as > hs) { awayClass = 'winner'; homeClass = 'loser'; }
    }

    const homeTBD = !match.home;
    const awayTBD = !match.away;

    // Format date
    let dateStr = '';
    let timeStr = '';
    if (match.date) {
        try {
            const d = new Date(match.date);
            dateStr = d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', timeZone: 'Asia/Ho_Chi_Minh' });
            timeStr = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Ho_Chi_Minh' });
        } catch (e) { /* ignore */ }
    }


    const posStyle = side === 'center'
        ? 'position:absolute;top:' + top + 'px;left:50%;transform:translateX(-50%);'
        : 'position:absolute;top:' + top + 'px;left:0;';

    const homeScoreHTML = hasScore
        ? '<span class="card-team-score">' + match.homeScore +
          (match.homePenalty != null ? '<span class="card-penalty-inline">(' + match.homePenalty + ')</span>' : '') +
          '</span>'
        : '';
    const awayScoreHTML = hasScore
        ? '<span class="card-team-score">' + match.awayScore +
          (match.awayPenalty != null ? '<span class="card-penalty-inline">(' + match.awayPenalty + ')</span>' : '') +
          '</span>'
        : '';

    return '<div class="bracket-match-card" style="' + posStyle + '--card-accent:' + accentColor + ';">' +
        '<div class="card-header">' +
        '<span class="card-match-num">M' + match.num + '</span>' +
        '<span class="card-datetime">' + dateStr + ' ' + timeStr + '</span>' +
        '</div>' +
        '<div class="card-teams">' +
        '<div class="card-team-row ' + homeClass + '">' +
        '<span class="card-team-flag">' + homeFlag + '</span>' +
        '<span class="card-team-name' + (homeTBD ? ' tbd' : '') + '">' + escHtml(homeTeam) + '</span>' +
        (match.homeGroupPos ? '<span class="card-group-pos">' + escHtml(match.homeGroupPos) + '</span>' : '') +
        homeScoreHTML +
        '</div>' +
        '<div class="card-team-row ' + awayClass + '">' +
        '<span class="card-team-flag">' + awayFlag + '</span>' +
        '<span class="card-team-name' + (awayTBD ? ' tbd' : '') + '">' + escHtml(awayTeam) + '</span>' +
        (match.awayGroupPos ? '<span class="card-group-pos">' + escHtml(match.awayGroupPos) + '</span>' : '') +
        awayScoreHTML +
        '</div>' +
        '</div>' +
        '</div>';
}

// ============================================
// CIRCULAR BRACKET
// ============================================
const CIRC_SIZE = 840;
const CIRC_CENTER = 420;
const CIRC_ROUNDS = [32, 16, 8, 4, 2, 1];
const CIRC_RADIUS = [394, 328, 260, 190, 120, 0];
const CIRC_DIAM   = [38, 46, 54, 62, 76, 102];
const CIRC_FLAG_SCALE = 0.65;
const CIRC_ROTATION_DEG = -45;

// R32 matches (16 matches → 32 slots, 2 per match)
const CIRC_L0 = [74,77,73,75, 83,84,81,82, 76,78,79,80, 86,88,85,87];
// R16 matches (8 matches → 8 slot pairs)
const CIRC_L1 = [89,90,93,94, 91,92,95,96];
// QF matches (4 matches → 4 slot pairs)
const CIRC_L2 = [97,98,99,100];
// SF matches (2 matches → 2 slot pairs)
const CIRC_L3 = [101,102];
// Final
const CIRC_L4 = [104];

// Quadrant colors: 0=gold, 1=green, 2=pink, 3=blue
const CIRC_COLORS = ['#d97706','#059669','#db2777','#2563eb'];
const CIRC_COLORS_LIGHT = [
    'rgba(217,119,6,0.28)', 'rgba(5,150,105,0.28)',
    'rgba(219,39,119,0.28)', 'rgba(37,99,235,0.28)'
];

let circActivePopup = null;

function circPos(level, index) {
    const n = CIRC_ROUNDS[level];
    const step = 360 / n;
    const angleDeg = -90 + CIRC_ROTATION_DEG + (index + 0.5) * step;
    const rad = angleDeg * Math.PI / 180;
    const r = CIRC_RADIUS[level];
    return {
        x: CIRC_CENTER + r * Math.cos(rad),
        y: CIRC_CENTER + r * Math.sin(rad),
        angleDeg, r
    };
}

function circMatchWinner(m) {
    if (!m || m.homeScore == null) return null;
    const hs = m.homePenalty != null ? m.homePenalty : m.homeScore;
    const as = m.awayPenalty != null ? m.awayPenalty : m.awayScore;
    if (hs > as) return { name: m.home || '', flag: m.homeFlag || '' };
    if (as > hs) return { name: m.away || '', flag: m.awayFlag || '' };
    return null;
}

function buildCircSlots(bracket) {
    const slots = CIRC_ROUNDS.map(n => new Array(n).fill(null));

    // L0: home/away teams for each R32 match (4 matches per quadrant)
    CIRC_L0.forEach((mNum, i) => {
        const m = bracket[String(mNum)];
        if (!m) return;
        const q = Math.floor(i / 4);
        if (m.home) slots[0][i * 2]     = { name: m.home, flag: m.homeFlag || '', q };
        if (m.away) slots[0][i * 2 + 1] = { name: m.away, flag: m.awayFlag || '', q };
    });

    // L1: winner of each R32 match → 16 slots (2 per quadrant's R16 matches)
    CIRC_L0.forEach((mNum, i) => {
        const w = circMatchWinner(bracket[String(mNum)]);
        if (w) slots[1][i] = { ...w, q: Math.floor(i / 4) };
    });

    // L2: winner of each R16 match → 8 slots
    CIRC_L1.forEach((mNum, i) => {
        const w = circMatchWinner(bracket[String(mNum)]);
        if (w) slots[2][i] = { ...w, q: Math.floor(i / 2) };
    });

    // L3: winner of each QF match → 4 slots
    CIRC_L2.forEach((mNum, i) => {
        const w = circMatchWinner(bracket[String(mNum)]);
        if (w) slots[3][i] = { ...w, q: i };
    });

    // L4: winner of each SF match → 2 slots
    CIRC_L3.forEach((mNum, i) => {
        const w = circMatchWinner(bracket[String(mNum)]);
        if (w) slots[4][i] = { ...w, q: i === 0 ? 0 : 2 };
    });

    // L5: champion
    const champ = circMatchWinner(bracket['104']);
    if (champ) slots[5][0] = { ...champ, q: 0 };

    return slots;
}

// Return match number to show in popup when clicking slot at (level, slotIdx)
function circGetMatchNum(level, slotIdx) {
    const matchLists = [CIRC_L0, CIRC_L1, CIRC_L2, CIRC_L3, CIRC_L4, CIRC_L4];
    const list = matchLists[level];
    if (!list) return null;
    if (level === 5) return 104;
    return list[Math.floor(slotIdx / 2)] || null;
}

function drawCircularBracket(bracket) {
    const stageEl = document.getElementById('circStage');
    const svgEl = document.getElementById('circLines');
    if (!stageEl || !svgEl) return;

    stageEl.querySelectorAll('.circ-slot').forEach(el => el.remove());
    while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

    const slots = buildCircSlots(bracket);

    // SVG connector lines
    for (let L = 0; L < CIRC_ROUNDS.length - 1; L++) {
        for (let i = 0; i < CIRC_ROUNDS[L]; i++) {
            const k = i >> 1;
            const cp = circPos(L, i);
            const pp = circPos(L + 1, k);
            const team = slots[L][i];
            const parent = slots[L + 1][k];
            const isWinner = team && parent && parent.name === team.name;
            const q = team ? team.q : Math.floor(i / (CIRC_ROUNDS[L] / 4));
            const color = isWinner ? CIRC_COLORS[q] : 'rgba(0,0,0,0.22)';
            const width = isWinner ? 3 : 1.2;

            const midAngle = cp.angleDeg * Math.PI / 180;
            const midX = CIRC_CENTER + pp.r * Math.cos(midAngle);
            const midY = CIRC_CENTER + pp.r * Math.sin(midAngle);
            const d = 'M ' + cp.x + ' ' + cp.y + ' L ' + midX + ' ' + midY + ' L ' + pp.x + ' ' + pp.y;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', color);
            path.setAttribute('stroke-width', String(width));
            path.setAttribute('stroke-linecap', 'round');
            svgEl.appendChild(path);
        }
    }

    // Slot circles
    for (let L = 0; L < CIRC_ROUNDS.length; L++) {
        for (let i = 0; i < CIRC_ROUNDS[L]; i++) {
            const team = slots[L][i];
            const p = circPos(L, i);
            const d = CIRC_DIAM[L];
            const q = team ? team.q : Math.floor(i / (CIRC_ROUNDS[L] / 4));
            const color = CIRC_COLORS[q];
            const colorLight = CIRC_COLORS_LIGHT[q];

            // Determine loser: sibling slot's team is in parent slot
            let isLoser = false;
            if (team && L < CIRC_ROUNDS.length - 1) {
                const parent = slots[L + 1][i >> 1];
                if (parent && parent.name !== team.name) isLoser = true;
            }

            const div = document.createElement('div');
            div.className = 'circ-slot' +
                (team ? ' filled' : ' empty') +
                (L === 5 && team ? ' champion' : '') +
                (isLoser ? ' loser' : '');
            div.style.cssText = 'width:' + d + 'px;height:' + d + 'px;left:' + p.x + 'px;top:' + p.y + 'px;';

            if (team) {
                div.style.borderColor = color;
                if (!isLoser) div.style.background = colorLight;

                const inner = document.createElement('div');
                inner.className = 'circ-slot-inner';
                inner.style.fontSize = Math.round(d * CIRC_FLAG_SCALE) + 'px';
                inner.textContent = team.flag;
                div.appendChild(inner);

                const tip = document.createElement('div');
                tip.className = 'circ-slot-tip';
                tip.textContent = team.name;
                div.appendChild(tip);

                const matchNum = circGetMatchNum(L, i);
                if (matchNum) {
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        showCircPopup(e, matchNum, bracket);
                    });
                }
            }

            stageEl.appendChild(div);
        }
    }

    const trophyEl = document.getElementById('circTrophy');
    if (trophyEl) trophyEl.style.display = slots[5][0] ? 'none' : 'block';
}

function showCircPopup(e, matchNum, bracket) {
    closeCircPopup();
    const m = bracket[String(matchNum)];
    if (!m) return;

    const hasScore = m.homeScore != null;
    let homeClass = '', awayClass = '';
    if (hasScore) {
        const hs = m.homePenalty != null ? m.homePenalty : m.homeScore;
        const as = m.awayPenalty != null ? m.awayPenalty : m.awayScore;
        if (hs > as) { homeClass = 'winner'; awayClass = 'loser-row'; }
        else if (as > hs) { awayClass = 'winner'; homeClass = 'loser-row'; }
    }

    let dateStr = '';
    if (m.date) {
        try {
            const d = new Date(m.date);
            dateStr = d.toLocaleString('vi-VN', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Ho_Chi_Minh'
            });
        } catch (ex) {}
    }

    const homeScoreHTML = hasScore
        ? '<span class="circ-popup-score">' + m.homeScore +
          (m.homePenalty != null ? '<span class="circ-popup-pen">(' + m.homePenalty + ')</span>' : '') +
          '</span>'
        : '';
    const awayScoreHTML = hasScore
        ? '<span class="circ-popup-score">' + m.awayScore +
          (m.awayPenalty != null ? '<span class="circ-popup-pen">(' + m.awayPenalty + ')</span>' : '') +
          '</span>'
        : '';

    const popup = document.createElement('div');
    popup.className = 'circ-popup';
    popup.id = 'circPopup';
    popup.innerHTML =
        '<span class="circ-popup-close" onclick="closeCircPopup()">&#x2715;</span>' +
        '<div class="circ-popup-title">M' + escHtml(String(m.num)) + ' &mdash; ' + escHtml(m.round || '') + '</div>' +
        '<div>' +
        '<div class="circ-popup-team ' + homeClass + '">' +
        '<span>' + escHtml(m.homeFlag || '') + '</span>' +
        '<span class="circ-popup-name">' + escHtml(m.home || 'TBD') + '</span>' +
        homeScoreHTML +
        '</div>' +
        '<div class="circ-popup-team ' + awayClass + '">' +
        '<span>' + escHtml(m.awayFlag || '') + '</span>' +
        '<span class="circ-popup-name">' + escHtml(m.away || 'TBD') + '</span>' +
        awayScoreHTML +
        '</div>' +
        '</div>' +
        (!hasScore ? '<div class="circ-no-result">Chưa có kết quả</div>' : '') +
        (dateStr ? '<div class="circ-popup-date">&#128197; ' + dateStr + '</div>' : '');

    document.body.appendChild(popup);
    circActivePopup = popup;

    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + 290 > window.innerWidth) x = e.clientX - 290;
    if (y + 220 > window.innerHeight) y = e.clientY - 220;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
}

function closeCircPopup() {
    if (circActivePopup) { circActivePopup.remove(); circActivePopup = null; }
    const old = document.getElementById('circPopup');
    if (old) old.remove();
}

function switchBracketTab(tab) {
    document.querySelectorAll('.bracket-tab-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.querySelectorAll('.bracket-tab-pane').forEach(function(pane) {
        pane.classList.toggle('active', pane.id === 'tab-' + tab);
    });
    if (tab === 'tron' && cachedData && cachedData.data && cachedData.data.bracket) {
        drawCircularBracket(cachedData.data.bracket);
    }
}

// ============================================
// BRACKET CONNECTORS (SVG)
// ============================================
function buildConnectors(fromPositions, toPositions, totalH, side) {
    // fromPositions: array of top values for source round
    // toPositions: array of top values for destination round
    // Each pair of from cards connects to one to card
    const w = 28;
    let paths = '';

    for (let i = 0; i < fromPositions.length; i += 2) {
        const targetIdx = Math.floor(i / 2);
        if (targetIdx >= toPositions.length) break;

        const y1 = fromPositions[i] + CARD_H / 2;
        const y2 = fromPositions[i + 1] + CARD_H / 2;
        const yT = toPositions[targetIdx] + CARD_H / 2;

        const color = 'rgba(37, 99, 235, 0.3)';

        if (side === 'left') {
            paths += '<path d="M 0 ' + y1 + ' H ' + (w / 2) + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M 0 ' + y2 + ' H ' + (w / 2) + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M ' + (w / 2) + ' ' + y1 + ' V ' + y2 + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M ' + (w / 2) + ' ' + yT + ' H ' + w + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
        } else {
            paths += '<path d="M ' + w + ' ' + y1 + ' H ' + (w / 2) + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M ' + w + ' ' + y2 + ' H ' + (w / 2) + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M ' + (w / 2) + ' ' + y1 + ' V ' + y2 + '" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
            paths += '<path d="M ' + (w / 2) + ' ' + yT + ' H 0" stroke="' + color + '" stroke-width="1.5" fill="none"/>';
        }
    }

    return '<svg width="' + w + '" height="' + totalH + '" style="position:absolute;top:28px;left:0;">' + paths + '</svg>';
}

function buildSFtoFinalConnector(sfCenter, finalCenter, totalH, side) {
    const w = 28;
    const color = 'rgba(180, 83, 9, 0.5)';

    let path;
    if (side === 'left') {
        const cpX = w * 0.7;
        path = '<path d="M 0 ' + sfCenter + ' C ' + cpX + ' ' + sfCenter + ' ' + cpX + ' ' + finalCenter + ' ' + w + ' ' + finalCenter + '" stroke="' + color + '" stroke-width="2" fill="none"/>';
    } else {
        const cpX = w * 0.3;
        path = '<path d="M ' + w + ' ' + sfCenter + ' C ' + cpX + ' ' + sfCenter + ' ' + cpX + ' ' + finalCenter + ' 0 ' + finalCenter + '" stroke="' + color + '" stroke-width="2" fill="none"/>';
    }

    return '<svg width="' + w + '" height="' + totalH + '" style="position:absolute;top:28px;left:0;">' + path + '</svg>';
}

// ============================================
// UTILITIES
// ============================================
function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================
// INIT
// ============================================
document.addEventListener('click', function(e) {
    if (circActivePopup && !circActivePopup.contains(e.target)) {
        closeCircPopup();
    }
});
document.addEventListener('DOMContentLoaded', loadData);
